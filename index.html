<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#16202b" />
  <title>Copart → Черкаси · Кошторис доставки</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <!-- Header -->
    <p class="eyebrow">Copart <span class="arrow">→</span> Черкаси</p>
    <h1>Кошторис доставки</h1>
    <p class="lede">Повна вартість доставки авто з аукціону Copart до Черкас: суша до порту, океан, розвантаження в Клайпеді, логістика та брокер.</p>

    <!-- Yard selector: searchable combobox -->
    <div class="field">
      <label id="yard-label" for="yard-input">Аукціонна площадка</label>
      <div class="combo">
        <input
          id="yard-input"
          class="combo-input"
          type="text"
          role="combobox"
          aria-expanded="false"
          aria-controls="yard-list"
          aria-autocomplete="list"
          autocomplete="off"
          placeholder="Знайдіть площадку, напр. Dallas"
        />
        <span class="combo-caret">&#9662;</span>
        <ul id="yard-list" class="combo-list" role="listbox" aria-labelledby="yard-label"></ul>
      </div>
    </div>

    <!-- Cargo type: segmented control -->
    <div class="field">
      <label>Тип авто</label>
      <div class="segment" id="type-segment" role="group" aria-label="Тип авто"></div>
    </div>

    <!-- Result: route + cost breakdown (signature element) -->
    <section class="manifest" id="manifest" aria-live="polite">
      <div class="manifest-empty" id="manifest-empty">
        Оберіть площадку й тип авто, щоб побачити кошторис.
      </div>
    </section>

    <!-- Owner / contact -->
    <footer class="credit">
      <p>&copy; <span id="year"></span> Oleh Vizirenko. Усі права захищено.</p>
      <p><a href="mailto:olegv1987@gmail.com">olegv1987@gmail.com</a></p>
    </footer>
  </main>

  <!-- Data first, then logic -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
