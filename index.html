<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#16202b" />
  <title>Copart → Klaipeda · Freight Estimate</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <!-- Header -->
    <p class="eyebrow">Copart <span class="arrow">→</span> Klaipeda</p>
    <h1>Freight estimate</h1>
    <p class="lede">Delivery cost from a Copart auction yard to the port of Klaipeda — road haul plus ocean freight.</p>

    <!-- Yard selector: searchable combobox -->
    <div class="field">
      <label id="yard-label" for="yard-input">Auction yard</label>
      <div class="combo">
        <input
          id="yard-input"
          class="combo-input"
          type="text"
          role="combobox"
          aria-expanded="false"
          aria-controls="yard-list"
          aria-autocomplete="list"
          autocomplete="off"
          placeholder="Search a yard, e.g. Dallas"
        />
        <span class="combo-caret">▾</span>
        <ul id="yard-list" class="combo-list" role="listbox" aria-labelledby="yard-label"></ul>
      </div>
    </div>

    <!-- Cargo type: segmented control -->
    <div class="field">
      <label>Vehicle type</label>
      <div class="segment" id="type-segment" role="group" aria-label="Vehicle type"></div>
    </div>

    <!-- Result: route + cost manifest (signature element) -->
    <section class="manifest" id="manifest" aria-live="polite">
      <div class="manifest-empty" id="manifest-empty">
        Pick a yard and a vehicle type to see the estimate.
      </div>
    </section>

    <p class="footnote">Estimate to Klaipeda port only — excludes auction fees and customs.</p>
  </main>

  <!-- Data first, then logic -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
