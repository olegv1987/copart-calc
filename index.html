<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#16202b" />
  <title>Copart → Черкаси · Кошторис доставки</title>
  <link rel="manifest" href="manifest.json" />
  <!-- iOS: install as a standalone app via Share -> Add to Home Screen -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Копарт → Черкаси" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <!-- Header -->
    <p class="eyebrow">Copart <span class="arrow">→</span> Черкаси</p>
    <p class="lede">Техніка з Copart до Черкас — повна вартість доставки й розмитнення.</p>

    <!-- Yard selector: searchable combobox -->
    <div class="field">
      <label id="yard-label" for="yard-input">Площадка Copart</label>
      <div class="combo">
        <input
          id="yard-input"
          class="combo-input"
          type="text"
          role="combobox"
          aria-expanded="false"
          aria-controls="yard-list"
          aria-autocomplete="list"
          autocomplete="off"
          placeholder="Знайдіть площадку, напр. Dallas"
        />
        <span class="combo-caret">&#9662;</span>
        <ul id="yard-list" class="combo-list" role="listbox" aria-labelledby="yard-label"></ul>
      </div>
    </div>

    <!-- Cargo type: segmented control -->
    <div class="field">
      <label>Тип транспорту</label>
      <div class="segment cols-4" id="type-segment" role="group" aria-label="Тип транспорту"></div>
    </div>

    <div id="carsize-group" class="carsize-row">
      <label class="check">
        <input id="size-large" type="checkbox" />
        <span>Кросовер</span>
      </label>
      <label class="check">
        <input id="size-oversize" type="checkbox" />
        <span>Пікап / Вел. кросовер</span>
      </label>
    </div>

    <!-- Copart purchase price + title type -->
    <div class="field">
      <label for="price-input">Ціна покупки на Copart, $</label>
      <div class="stepper">
        <button type="button" id="price-minus" aria-label="Менше">−</button>
        <input id="price-input" class="text-input" type="text" inputmode="numeric" autocomplete="off" placeholder="напр. 5500" />
        <button type="button" id="price-plus" aria-label="Більше">+</button>
      </div>
    </div>

    <div class="field" id="cleantitle-field">
      <label class="check">
        <input id="clean-title" type="checkbox" />
        <span>Чисті документи (Clean Title)</span>
      </label>
    </div>

    <!-- Powertrain -->
    <div class="field" id="powertrain-field">
      <label>Тип пального</label>
      <div class="segment" id="fuel-segment" role="group" aria-label="Тип пального"></div>
    </div>

    <!-- Customs inputs -->
    <div id="combustion-group">
      <div class="field">
        <label class="check">
          <input id="hybrid" type="checkbox" />
          <span>Гібрид</span>
        </label>
      </div>

      <div class="field two-col">
        <div>
          <label for="vol-input">Об'єм двигуна, л</label>
          <div class="stepper">
            <button type="button" id="vol-minus" aria-label="Менше">−</button>
            <input id="vol-input" class="text-input" type="text" inputmode="decimal" autocomplete="off" />
            <button type="button" id="vol-plus" aria-label="Більше">+</button>
          </div>
        </div>
        <div>
          <label for="year-input">Рік випуску</label>
          <div class="stepper">
            <button type="button" id="year-minus" aria-label="Менше">−</button>
            <input id="year-input" class="text-input" type="text" inputmode="numeric" autocomplete="off" />
            <button type="button" id="year-plus" aria-label="Більше">+</button>
          </div>
        </div>
      </div>
    </div>

    <div id="electric-group">
      <div class="field">
        <label for="batt-input">Ємність батареї, кВт·год</label>
        <div class="stepper">
          <button type="button" id="batt-minus" aria-label="Менше">−</button>
          <input id="batt-input" class="text-input" type="text" inputmode="numeric" autocomplete="off" />
          <button type="button" id="batt-plus" aria-label="Більше">+</button>
        </div>
      </div>
    </div>

    <div id="moto-group">
      <div class="field">
        <label class="check">
          <input id="crashedtoys" type="checkbox" checked />
          <span>Аукціон CrashedToys</span>
        </label>
      </div>
      <div class="field">
        <label class="check">
          <input id="big-moto" type="checkbox" />
          <span>Великий мотоцикл <span class="hint">(напр. Honda Gold Wing, Harley Electra Glide)</span></span>
        </label>
      </div>
      <div class="field">
        <label for="cc-input">Об'єм двигуна, л</label>
        <div class="stepper">
          <button type="button" id="cc-minus" aria-label="Менше">−</button>
          <input id="cc-input" class="text-input" type="text" inputmode="decimal" autocomplete="off" />
          <button type="button" id="cc-plus" aria-label="Більше">+</button>
        </div>
      </div>
    </div>

    <div id="atv-group">
      <div class="field">
        <label class="check">
          <input id="atv-crashedtoys" type="checkbox" checked />
          <span>Аукціон CrashedToys</span>
        </label>
      </div>
      <div class="field two-col">
        <div>
          <label for="atv-cc-input">Об'єм двигуна, л</label>
          <div class="stepper">
            <button type="button" id="atv-cc-minus" aria-label="Менше">−</button>
            <input id="atv-cc-input" class="text-input" type="text" inputmode="decimal" autocomplete="off" />
            <button type="button" id="atv-cc-plus" aria-label="Більше">+</button>
          </div>
        </div>
        <div>
          <label for="atv-year-input">Рік випуску</label>
          <div class="stepper">
            <button type="button" id="atv-year-minus" aria-label="Менше">−</button>
            <input id="atv-year-input" class="text-input" type="text" inputmode="numeric" autocomplete="off" />
            <button type="button" id="atv-year-plus" aria-label="Більше">+</button>
          </div>
        </div>
      </div>
    </div>

    <div id="jetski-group">
      <div class="field">
        <label class="check">
          <input id="jetski-trailer" type="checkbox" />
          <span>З причепом <span class="hint">(Jet Ski w/trailer — інший тариф фрахту)</span></span>
        </label>
      </div>
    </div>

    <!-- Result: route + cost breakdown (signature element) -->
    <section class="manifest" id="manifest" aria-live="polite">
      <div class="manifest-empty" id="manifest-empty">
        Оберіть площадку й тип авто, щоб побачити кошторис.
      </div>
    </section>

    <!-- Owner / contact -->
    <footer class="credit">
      <p>&copy; <span id="year"></span> Oleh Vizirenko. Усі права захищено.</p>
      <p><a href="mailto:olegv1987@gmail.com">olegv1987@gmail.com</a></p>
    </footer>
  </main>

  <!-- Data first, then logic -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
